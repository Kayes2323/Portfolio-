<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdul Aziz Kayes — Web Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060a;
  --card: #0e0e16;
  --border: #1a1a2e;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --text: #e8e8f0;
  --muted: #5a5a7a;
  --light: #a0a0c0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}
.blob { position: fixed; border-radius: 50%; filter: blur(140px); pointer-events: none; z-index: 0; opacity: 0.13; }
.blob-1 { width: 700px; height: 700px; background: var(--accent); top: -300px; right: -200px; }
.blob-2 { width: 500px; height: 500px; background: var(--accent2); bottom: 0; left: -200px; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 3rem;
  background: rgba(6,6,10,0.8); backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(108,99,255,0.1);
}
.nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 0.5rem; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-cta { background: var(--accent); color: #fff; padding: 0.5rem 1.2rem; border-radius: 6px; font-size: 0.82rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.nav-cta:hover { background: #8078ff; transform: translateY(-1px); }

/* HERO */
.hero {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  align-items: center; gap: 4rem;
  padding: 7rem 5rem 4rem;
  max-width: 1200px; margin: 0 auto;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 0.6rem;
  background: rgba(108,99,255,0.08); border: 1px solid rgba(108,99,255,0.25);
  border-radius: 999px; padding: 0.4rem 1rem;
  font-size: 0.75rem; color: #a09cf5; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 1.5rem; animation: slideUp 0.6s ease both;
}
.tag-dot { width: 6px; height: 6px; background: var(--accent3); border-radius: 50%; animation: pulse 2s infinite; }
h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.4rem, 4vw, 4rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.2rem; animation: slideUp 0.6s ease 0.1s both; }
.h1-gradient { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.hero-desc { font-size: 1.02rem; color: var(--light); line-height: 1.75; margin-bottom: 2.5rem; max-width: 460px; animation: slideUp 0.6s ease 0.2s both; }
.hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; animation: slideUp 0.6s ease 0.3s both; }
.btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.85rem 1.8rem; border-radius: 8px; font-size: 0.9rem; font-weight: 600; text-decoration: none; transition: all 0.25s; font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; }
.btn-primary { background: linear-gradient(135deg, var(--accent), #8078ff); color: #fff; box-shadow: 0 4px 24px rgba(108,99,255,0.35); }
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(108,99,255,0.5); }
.btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }

/* PHOTO */
.hero-right { display: flex; justify-content: center; animation: slideUp 0.6s ease 0.2s both; }
.photo-wrap {
  position: relative;
  width: 300px; height: 360px;
}
.photo-ring {
  width: 280px; height: 340px;
  border-radius: 32px;
  padding: 3px;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
  box-shadow: 0 30px 80px rgba(108,99,255,0.3);
  margin: 0 auto;
}
.photo-inner { width: 100%; height: 100%; border-radius: 30px; overflow: hidden; background: var(--card); }
.photo-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; filter: brightness(1.05) contrast(1.02); }
.photo-badge {
  position: absolute; bottom: 0; left: -10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 0.7rem 1rem;
  display: flex; align-items: center; gap: 0.6rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.badge-text { font-size: 0.78rem; font-weight: 600; color: var(--text); }
.badge-sub { font-size: 0.65rem; color: var(--muted); }
.photo-badge2 {
  position: absolute; top: 10px; right: -10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 12px; padding: 0.6rem 0.9rem;
  box-shadow: 0 8px 20px rgba(108,99,255,0.4);
}
.badge2-text { font-size: 0.72rem; font-weight: 700; color: #fff; }

/* STATS */
.stats-bar {
  position: relative; z-index: 1;
  background: var(--card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  display: flex; justify-content: center;
}
.stat-item { flex: 1; text-align: center; padding: 2rem; border-right: 1px solid var(--border); transition: background 0.3s; }
.stat-item:last-child { border-right: none; }
.stat-item:hover { background: rgba(108,99,255,0.05); }
.stat-num { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; display: block; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.3rem; }

/* SECTION */
.section { position: relative; z-index: 1; padding: 6rem 5rem; max-width: 1200px; margin: 0 auto; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 0.8rem; }
.eyebrow-line { width: 24px; height: 2px; background: var(--accent); border-radius: 2px; }
h2 { font-family: 'Syne', sans-serif; font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.8rem; line-height: 1.15; }
.section-sub { color: var(--light); font-size: 1rem; max-width: 500px; line-height: 1.7; margin-bottom: 3.5rem; }

/* PROJECT CARDS */
.projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.project-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2rem;
  text-decoration: none; color: inherit; display: block; position: relative; overflow: hidden;
  transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
}
.project-card:hover { border-color: rgba(108,99,255,0.4); transform: translateY(-6px); box-shadow: 0 24px 60px rgba(108,99,255,0.15); }
.project-num { font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 1.2rem; }

/* Project Logo */
.project-logo-box {
  width: 60px; height: 60px; border-radius: 16px; overflow: hidden;
  margin-bottom: 1.2rem; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--border);
}
.project-logo-box img { width: 100%; height: 100%; object-fit: cover; }
.project-logo-vocabrain {
  width: 60px; height: 60px; border-radius: 16px;
  background: linear-gradient(135deg, #6c63ff, #a78bfa);
  margin-bottom: 1.2rem; display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; border: 1px solid rgba(108,99,255,0.3);
}

.project-card h3 { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
.project-card p { color: var(--light); font-size: 0.88rem; line-height: 1.65; margin-bottom: 1.5rem; }
.project-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
.ptag { font-size: 0.66rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }
.project-arrow { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--accent); font-weight: 700; transition: gap 0.2s; }
.project-card:hover .project-arrow { gap: 0.8rem; }

/* SERVICES */
.services-bg { background: rgba(108,99,255,0.02); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; z-index: 1; }
.services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
.service-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.8rem; display: flex; gap: 1.2rem; align-items: flex-start; transition: border-color 0.2s, transform 0.2s; }
.service-card:hover { border-color: rgba(108,99,255,0.3); transform: translateY(-3px); }
.service-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.service-card h4 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
.service-card p { font-size: 0.85rem; color: var(--light); line-height: 1.6; }

/* WHY */
.why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
.why-card { padding: 1.5rem; border-radius: 14px; border: 1px solid var(--border); background: var(--card); }
.why-icon { font-size: 1.5rem; margin-bottom: 0.8rem; }
.why-card h4 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; }
.why-card p { font-size: 0.82rem; color: var(--light); line-height: 1.55; }

/* CONTACT */
.contact-section { position: relative; z-index: 1; padding: 6rem 5rem; }
.contact-box { max-width: 800px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 4rem; text-align: center; position: relative; overflow: hidden; }
.contact-box::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 50%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.contact-box p { color: var(--light); font-size: 1rem; margin-bottom: 2.5rem; margin-top: 0.8rem; }
.contact-btns { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }

footer { position: relative; z-index: 1; text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; }

@keyframes slideUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }
.reveal { opacity: 0; transform: translateY(32px); transition: all 0.7s cubic-bezier(0.4,0,0.2,1); }
.reveal.vis { opacity: 1; transform: translateY(0); }

@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; padding: 6rem 2rem 3rem; text-align: center; }
  .hero-right { order: -1; }
  .hero-btns { justify-content: center; }
  .hero-desc { margin: 0 auto 2rem; }
  .section { padding: 4rem 2rem; }
  .projects-grid, .services-grid, .why-grid { grid-template-columns: 1fr; }
  nav { padding: 1rem 1.5rem; }
  .nav-links { display: none; }
  .contact-box { padding: 2.5rem 1.5rem; }
  .contact-section { padding: 4rem 2rem; }
}
</style>
</head>
